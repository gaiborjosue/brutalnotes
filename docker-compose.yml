# BRUTAL NOTES - Docker Compose Configuration
# Production deployment setup

version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: brutal-notes-frontend
    ports:
      - "3000:80"
    environment:
      # These can be overridden via .env file or environment variables
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-https://ctdtutltiwtxywmwylqq.supabase.co}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      - VITE_ELECTRIC_PROXY_URL=${VITE_ELECTRIC_PROXY_URL:-http://localhost:8000/api/v1/electric/shape}
    volumes:
      # Optional: Mount custom nginx config if needed
      # - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - brutal-notes

  # Optional: Nginx reverse proxy (if you want to serve multiple services)
  # reverse-proxy:
  #   image: nginx:alpine
  #   container_name: brutal-notes-proxy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - frontend
  #   restart: unless-stopped
  #   networks:
  #     - brutal-notes

networks:
  brutal-notes:
    driver: bridge

# Uncomment for persistent volumes if needed
